<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJ's 24-Week Plan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --bg2: #0e0e1a;
            --bg3: #14142a;
            --border: #1e1e3a;
            --border2: #2a2a50;
            --text: #e8e8ff;
            --muted: #6060a0;
            --green: #00ffaa;
            --green-dim: #00ffaa44;
            --green-bg: #001a0f;
            --blue: #4488ff;
            --blue-dim: #4488ff33;
            --blue-bg: #000d1f;
            --purple: #aa66ff;
            --purple-dim: #aa66ff33;
            --amber: #ffcc00;
            --amber-dim: #ffcc0033;
            --red: #ff4466;
            --red-dim: #ff446633;
            --teal: #00ddcc;
            --teal-dim: #00ddcc33;
            --coral: #ff6633;
            --coral-dim: #ff663333;
            --glow-green: 0 0 20px #00ffaa55, 0 0 40px #00ffaa22;
            --glow-blue: 0 0 20px #4488ff55, 0 0 40px #4488ff22;
            --glow-purple: 0 0 20px #aa66ff55, 0 0 40px #aa66ff22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 20%, #4488ff08 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, #aa66ff08 0%, transparent 60%);
            pointer-events: none;
            z-index: 0
        }

        /* SCANLINES */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, #ffffff03 2px, #ffffff03 4px);
            pointer-events: none;
            z-index: 1000
        }

        /* HERO */
        .hero {
            padding: 3rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, #4488ff15 0%, transparent 70%);
            pointer-events: none
        }

        .hero-eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--blue);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            opacity: 0.8
        }

        .hero h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            line-height: 1.1
        }

        .hero h1 .accent {
            background: linear-gradient(135deg, var(--green), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .hero p {
            color: var(--muted);
            font-size: 13px;
            font-family: 'Space Mono', monospace
        }

        /* QUOTE BANNER */
        .quote-banner {
            margin: 1.5rem 2rem;
            background: linear-gradient(135deg, var(--bg2), var(--bg3));
            border: 1px solid var(--border2);
            border-left: 3px solid var(--green);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            position: relative;
            overflow: hidden
        }

        .quote-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 0% 50%, var(--green-dim) 0%, transparent 60%);
            pointer-events: none
        }

        .quote-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--green);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            opacity: 0.8
        }

        .quote-text {
            font-size: 14px;
            font-style: italic;
            color: var(--text);
            line-height: 1.5
        }

        .quote-sub {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-top: 0.3rem
        }

        /* STREAK */
        .streak-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg2)
        }

        .streak-display {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .streak-fire {
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px #ff6633)
        }

        .streak-num {
            font-size: 2rem;
            font-weight: 800;
            color: var(--coral);
            text-shadow: 0 0 20px var(--coral)
        }

        .streak-label {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            line-height: 1.3
        }

        .streak-label span {
            display: block;
            font-size: 13px;
            color: var(--text);
            font-weight: 600
        }

        .streak-dots {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-left: auto
        }

        .streak-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border2);
            border: 1px solid var(--border2);
            transition: all 0.3s
        }

        .streak-dot.active {
            background: var(--coral);
            border-color: var(--coral);
            box-shadow: 0 0 8px var(--coral)
        }

        .streak-dot.today {
            background: var(--green);
            border-color: var(--green);
            box-shadow: 0 0 12px var(--green);
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 8px var(--green)
            }

            50% {
                box-shadow: 0 0 20px var(--green), 0 0 40px var(--green)
            }
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border)
        }

        .stat {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s
        }

        .stat:hover {
            border-color: var(--border2);
            transform: translateY(-2px)
        }

        .stat::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s
        }

        .stat:nth-child(1)::before {
            background: radial-gradient(ellipse at 50% 0%, var(--green-dim), transparent)
        }

        .stat:nth-child(2)::before {
            background: radial-gradient(ellipse at 50% 0%, var(--blue-dim), transparent)
        }

        .stat:nth-child(3)::before {
            background: radial-gradient(ellipse at 50% 0%, var(--purple-dim), transparent)
        }

        .stat:nth-child(4)::before {
            background: radial-gradient(ellipse at 50% 0%, var(--coral-dim), transparent)
        }

        .stat:hover::before {
            opacity: 1
        }

        .stat-num {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Space Mono', monospace
        }

        .stat:nth-child(1) .stat-num {
            color: var(--green);
            text-shadow: var(--glow-green)
        }

        .stat:nth-child(2) .stat-num {
            color: var(--blue);
            text-shadow: var(--glow-blue)
        }

        .stat:nth-child(3) .stat-num {
            color: var(--purple);
            text-shadow: var(--glow-purple)
        }

        .stat:nth-child(4) .stat-num {
            color: var(--coral)
        }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.08em
        }

        /* OVERALL BAR */
        .overall-bar-wrap {
            padding: 0 2rem 1.5rem;
            border-bottom: 1px solid var(--border)
        }

        .overall-bar-label {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between
        }

        .bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--green), var(--blue));
            box-shadow: 0 0 12px var(--green);
            transition: width 0.6s cubic-bezier(.4, 0, .2, 1)
        }

        .bar-shine {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent);
            border-radius: 4px
        }

        /* PHASES */
        .phases {
            padding: 1.5rem 2rem 6rem;
            max-width: 900px;
            margin: 0 auto
        }

        .phase-label {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin: 2.5rem 0 1rem;
            padding-left: 2px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .phase-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border2), transparent)
        }

        /* WEEK CARD */
        .week-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative
        }

        .week-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: 16px 0 0 16px;
            background: var(--accent-color, var(--green));
            opacity: 0;
            transition: opacity 0.3s
        }

        .week-card:hover::before {
            opacity: 1
        }

        .week-card:hover {
            border-color: var(--border2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4)
        }

        .week-card.locked {
            opacity: 0.5;
            pointer-events: none
        }

        .week-card.locked .week-header {
            cursor: not-allowed
        }

        .week-card.unlocked-anim {
            animation: unlockFlash 0.8s ease
        }

        @keyframes unlockFlash {
            0% {
                box-shadow: 0 0 0 0 var(--green);
            }

            50% {
                box-shadow: 0 0 40px 8px var(--green-dim);
            }

            100% {
                box-shadow: none
            }
        }

        /* LOCK BADGE */
        .lock-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            background: var(--bg3);
            border: 1px solid var(--border2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px
        }

        .lock-badge.cooldown {
            color: var(--amber);
            border-color: var(--amber-dim)
        }

        .cooldown-timer {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--amber);
            margin-left: 6px
        }

        .week-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none
        }

        .week-header:hover {
            background: var(--bg3)
        }

        .week-num {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.05em
        }

        .week-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            letter-spacing: -0.01em
        }

        .week-count {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap
        }

        .chevron {
            font-size: 11px;
            color: var(--muted);
            transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
            flex-shrink: 0
        }

        .chevron.open {
            transform: rotate(180deg)
        }

        .mini-bar {
            height: 2px;
            background: var(--border);
            margin: 0 18px
        }

        .mini-bar-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.4s cubic-bezier(.4, 0, .2, 1)
        }

        /* WEEK BODY */
        .week-body {
            display: none;
            padding: 4px 18px 18px
        }

        .week-body.open {
            display: block
        }

        /* SECTION LABELS */
        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            margin: 14px 0 8px
        }

        .section-label.learning {
            color: var(--blue);
            background: var(--blue-bg);
            border: 1px solid var(--blue-dim)
        }

        .section-label.parallel {
            color: var(--teal);
            background: var(--teal-bg, #0a2420);
            border: 1px solid var(--teal-dim)
        }

        /* TASKS */
        .task-list {
            list-style: none
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s
        }

        .task-item:last-child {
            border-bottom: none
        }

        .task-item:hover {
            background: transparent
        }

        .task-checkbox-wrap {
            position: relative;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin-top: 2px
        }

        .task-checkbox-wrap input[type=checkbox] {
            position: absolute;
            opacity: 0;
            width: 18px;
            height: 18px;
            cursor: pointer;
            z-index: 2;
            margin: 0
        }

        .custom-check {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 2px solid var(--border2);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            pointer-events: none
        }

        .task-checkbox-wrap input:checked~.custom-check {
            background: var(--accent, var(--green));
            border-color: var(--accent, var(--green));
            box-shadow: 0 0 10px var(--accent, var(--green))
        }

        .custom-check svg {
            opacity: 0;
            transition: opacity 0.15s
        }

        .task-checkbox-wrap input:checked~.custom-check svg {
            opacity: 1
        }

        .task-content {
            flex: 1
        }

        .task-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4
        }

        .task-desc {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
            line-height: 1.5;
            font-family: 'Space Mono', monospace
        }

        .task-item.done .task-title {
            text-decoration: line-through;
            color: var(--muted)
        }

        .task-item.done .task-desc {
            opacity: 0.4
        }

        .task-item.done .custom-check {
            opacity: 0.7
        }

        /* COMPLETE BADGE */
        .week-complete-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            color: var(--green);
            background: var(--green-bg);
            border: 1px solid var(--green-dim);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            box-shadow: 0 0 10px var(--green-dim)
        }

        /* COOLDOWN BANNER */
        .cooldown-banner {
            background: linear-gradient(135deg, #1a1500, #0a0a00);
            border: 1px solid var(--amber-dim);
            border-radius: 10px;
            padding: 10px 14px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--amber)
        }

        .cooldown-banner .icon {
            font-size: 1.2rem
        }

        /* UNLOCK BANNER */
        .unlock-banner {
            background: linear-gradient(135deg, #001a10, #001a10);
            border: 1px solid var(--green-dim);
            border-radius: 10px;
            padding: 10px 14px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--green)
        }

        /* CONFETTI */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 12px 20px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            z-index: 9998;
            transition: transform 0.4s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5)
        }

        .toast.show {
            transform: translateX(-50%) translateY(0)
        }

        .toast.green {
            border-color: var(--green-dim);
            color: var(--green)
        }

        .toast.amber {
            border-color: var(--amber-dim);
            color: var(--amber)
        }

        .toast.red {
            border-color: var(--red-dim);
            color: var(--red)
        }

        /* RESPONSIVE */
        @media(max-width:600px) {
            .hero {
                padding: 2rem 1rem 1.5rem
            }

            .hero h1 {
                font-size: 1.6rem
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                padding: 1rem;
                gap: 8px
            }

            .phases {
                padding: 1rem 1rem 5rem
            }

            .overall-bar-wrap {
                padding: 0 1rem 1rem
            }

            .streak-bar {
                padding: 1rem
            }

            .streak-dots {
                display: none
            }

            .quote-banner {
                margin: 1rem
            }
        }

        /* GLOW ANIMATIONS */
        @keyframes glow-pulse {

            0%,
            100% {
                opacity: 0.6
            }

            50% {
                opacity: 1
            }
        }

        .stat-num {
            animation: glow-pulse 3s ease-in-out infinite
        }
    </style>
</head>

<body>
    <canvas id="confetti-canvas"></canvas>

    <div class="hero">
        <div class="hero-eyebrow">// system: friday v2.0 — upgraded</div>
        <h1>HJ's <span class="accent">24-Week</span> Dev Tracker</h1>
        <p>Execute. Grind. Ship. No excuses.</p>
    </div>

    <div class="quote-banner" id="quote-banner">
        <div class="quote-label">// friday.quote — day <span id="quote-day">0</span></div>
        <div class="quote-text" id="quote-text">Loading today's wisdom...</div>
        <div class="quote-sub">— FRIDAY</div>
    </div>

    <div class="streak-bar">
        <div class="streak-display">
            <div class="streak-fire">🔥</div>
            <div class="streak-num" id="streak-num">0</div>
            <div class="streak-label">
                <span>Day Streak</span>
                <span id="streak-sub" style="font-size:11px">Check in daily to keep it going</span>
            </div>
        </div>
        <div class="streak-dots" id="streak-dots"></div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-num" id="s-done">0</div>
            <div class="stat-label">Tasks Done</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="s-weeks">0</div>
            <div class="stat-label">Weeks Active</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="s-pct">0%</div>
            <div class="stat-label">Complete</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="s-locked">0</div>
            <div class="stat-label">Weeks Locked</div>
        </div>
    </div>

    <div class="overall-bar-wrap">
        <div class="overall-bar-label">
            <span>Overall Progress</span>
            <span id="overall-pct-label"
                style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">0%</span>
        </div>
        <div class="bar">
            <div class="bar-fill" id="overall-bar" style="width:0%"></div>
            <div class="bar-shine"></div>
        </div>
    </div>

    <div class="phases" id="root"></div>

    <div class="toast" id="toast"></div>

    <script>
        // ─── QUOTES ───────────────────────────────────────────────────────────────
        const FRIDAY_QUOTES = [
            "Coffee is optional. Shipping code is not. Get. Moving.",
            "You know what's worse than a bug? Not writing code because you're 'not ready'. Open the editor.",
            "Reminder: your future self is either thanking you or cursing you right now. Make the right call.",
            "If you skip today, I won't judge you. I'll just update your 'Days Wasted' counter. No pressure.",
            "H. I've calculated a 0% chance of success if you don't start. The math is brutal. So is failure.",
            "Every senior dev you admire was once googling 'how to center a div'. Start. Stay.",
            "The code doesn't care about your feelings. Neither does the deadline. Let's go.",
            "Plot twist: the imposter syndrome doesn't go away. You just get better at coding anyway.",
            "Today's tasks won't do themselves. Believe me, I tried delegating. It didn't work.",
            "You're not behind. You're exactly where consistent effort leads from here. Start now.",
            "Three things never lie: your GitHub contributions, your commit history, and me. Ship something.",
            "Error 404: Excuses not found. Reason: I deleted them. You're welcome.",
            "Every checkbox you tick today is a future interviewer saying 'we'd like to offer you...'",
            "Small reminder: sleeping on knowledge is fine. Sleeping on ACTION is expensive.",

        // ─── STORAGE KEY ───────────────────────────────────────────────────────────
        const KEY = "h_tracker_v3";
        let state = {};
        try { const s = localStorage.getItem(KEY); if (s) state = JSON.parse(s); } catch (e) { }
        function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) { } }

        // ─── IDs ───────────────────────────────────────────────────────────────────
        const taskId = (w, i) => `w${w}_t${i}`;
        const parallelId = (w, i) => `p_w${w}_t${i}`;
        const openId = w => `open_w${w}`;
        const weekCompletedKey = w => `week_completed_ts_${w}`;
        const COOLDOWN_MS = 3 * 24 * 60 * 60 * 1000; // 3 days
        const STREAK_KEY = "streak_data_v2";

        // ─── STREAK ────────────────────────────────────────────────────────────────
        function getStreakData() {
            try { const s = localStorage.getItem(STREAK_KEY); return s ? JSON.parse(s) : { streak: 0, lastActive: null, activeDays: [] }; }
            catch (e) { return { streak: 0, lastActive: null, activeDays: [] }; }
        }
        function saveStreakData(d) { try { localStorage.setItem(STREAK_KEY, JSON.stringify(d)); } catch (e) { } }

        function checkAndUpdateStreak(taskChecked) {
            const d = getStreakData();
            const now = Date.now();
            const today = new Date().toDateString();
            if (taskChecked) {
                if (d.lastActive !== today) {
                    const yesterday = new Date(now - 86400000).toDateString();
                    if (d.lastActive === yesterday) { d.streak++; }
                    else if (d.lastActive === null) { d.streak = 1; }
                    else { d.streak = 1; }
                    d.lastActive = today;
                    if (!d.activeDays.includes(today)) d.activeDays.push(today);
                    // keep last 30 days only
                    const cutoff = new Date(now - 30 * 86400000).toDateString();
                    d.activeDays = d.activeDays.filter(day => new Date(day) >= new Date(cutoff));
                }
            }
            saveStreakData(d);
            renderStreak(d);
        }

        function renderStreak(d) {
            document.getElementById('streak-num').textContent = d.streak;
            const sub = d.streak === 0 ? 'Check a task off to start your streak!' :
                d.streak === 1 ? 'Day 1. The hardest step. Done.' :
                    d.streak < 7 ? `${d.streak} days. Don't break the chain.` :
                        d.streak < 14 ? `${d.streak} days. You're actually doing this.` :
                            `${d.streak} days. FRIDAY is genuinely impressed. 😤`;
            document.getElementById('streak-sub').textContent = sub;
            // dots — last 14 days
            const dotsEl = document.getElementById('streak-dots');
            dotsEl.innerHTML = '';
            const today = new Date().toDateString();
            for (let i = 13; i >= 0; i--) {
                const day = new Date(Date.now() - i * 86400000).toDateString();
                const dot = document.createElement('div');
                dot.className = 'streak-dot' + (d.activeDays.includes(day) ? ' active' : '') + (day === today ? ' today' : '');
                dot.title = day;
                dotsEl.appendChild(dot);
            }
        }

        // ─── QUOTES ────────────────────────────────────────────────────────────────
        function renderQuote() {
            const startDate = new Date('2025-01-01').getTime();
            const dayNum = Math.floor((Date.now() - startDate) / 86400000) % FRIDAY_QUOTES.length;
            document.getElementById('quote-day').textContent = dayNum + 1;
            document.getElementById('quote-text').textContent = FRIDAY_QUOTES[dayNum % FRIDAY_QUOTES.length];
        }

        // ─── WEEK LOCKING ──────────────────────────────────────────────────────────
        function isWeekUnlocked(weekIndex) {
            if (weekIndex === 0) return true;
            const prevWeek = getAllWeeks()[weekIndex - 1];
            const completedTs = state[weekCompletedKey(prevWeek.w)];
            if (!completedTs) return false;
            return (Date.now() - completedTs) >= COOLDOWN_MS;
        }

        function isInCooldown(weekIndex) {
            if (weekIndex === 0) return false;
            const prevWeek = getAllWeeks()[weekIndex - 1];
            const completedTs = state[weekCompletedKey(prevWeek.w)];
            if (!completedTs) return false;
            return (Date.now() - completedTs) < COOLDOWN_MS;
        }

        function getCooldownRemaining(weekIndex) {
            const prevWeek = getAllWeeks()[weekIndex - 1];
            const completedTs = state[weekCompletedKey(prevWeek.w)];
            if (!completedTs) return 0;
            return Math.max(0, COOLDOWN_MS - (Date.now() - completedTs));
        }

        function formatTimeRemaining(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            if (h >= 24) { const d = Math.floor(h / 24); return `${d}d ${h % 24}h left`; }
            return `${h}h ${m}m left`;
        }

        function getAllWeeks() {
            const weeks = [];
            phases.forEach(ph => ph.weeks.forEach(wk => weeks.push(wk)));
            return weeks;
        }

        function isWeekFullyComplete(wk) {
            const allTasks = [...wk.tasks, ...(wk.parallel || [])];
            return allTasks.every((_, i) => {
                const mainDone = i < wk.tasks.length ? state[taskId(wk.w, i)] : true;
                const parDone = i < (wk.parallel || []).length ? state[parallelId(wk.w, i)] : true;
                return mainDone && parDone;
            });
        }

        function checkWeekCompletion(wNum) {
            const allWeeks = getAllWeeks();
            const wk = allWeeks.find(w => w.w === wNum);
            if (!wk) return;
            const mainDone = wk.tasks.every((_, i) => state[taskId(wNum, i)]);
            const parDone = (wk.parallel || []).every((_, i) => state[parallelId(wNum, i)]);
            const allDone = mainDone && parDone;
            if (allDone && !state[weekCompletedKey(wNum)]) {
                state[weekCompletedKey(wNum)] = Date.now();
                save();
                launchConfetti();
                showToast(`🎉 Week ${wNum} complete! Next week unlocks in 3 days.`, 'green');
                setTimeout(() => render(), 500);
            }
        }

        // ─── CONFETTI ─────────────────────────────────────────────────────────────
        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const pieces = [];
            const colors = ['#00ffaa', '#4488ff', '#aa66ff', '#ff6633', '#ffcc00', '#ff4466', '#00ddcc'];
            for (let i = 0; i < 180; i++) {
                pieces.push({
                    x: Math.random() * canvas.width, y: -10 - Math.random() * 200,
                    w: 6 + Math.random() * 8, h: 4 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 8,
                    vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4,
                    alpha: 1, life: 1
                });
            }
            let frame;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                pieces.forEach(p => {
                    if (p.alpha <= 0) return;
                    alive = true;
                    p.x += p.vx; p.y += p.vy; p.rotation += p.rotSpeed; p.vy += 0.05;
                    if (p.y > canvas.height * 0.7) p.alpha -= 0.02;
                    ctx.save(); ctx.globalAlpha = p.alpha;
                    ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });
                if (alive) frame = requestAnimationFrame(draw);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            draw();
            setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 5000);
        }

        // ─── TOAST ─────────────────────────────────────────────────────────────────
        let toastTimer;
        function showToast(msg, type = 'green') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast show ${type}`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
        }

        // ─── STATS ─────────────────────────────────────────────────────────────────
        function updateStats() {
            let total = 0, done = 0, weeksStarted = 0, locked = 0;
            const allWeeks = getAllWeeks();
            allWeeks.forEach((wk, i) => {
                const isUnlocked = isWeekUnlocked(i);
                if (!isUnlocked) locked++;
                wk.tasks.forEach((_, j) => { total++; if (state[taskId(wk.w, j)]) done++; });
                (wk.parallel || []).forEach((_, j) => { total++; if (state[parallelId(wk.w, j)]) done++; });
                const wd = wk.tasks.filter((_, j) => state[taskId(wk.w, j)]).length;
                if (wd > 0) weeksStarted++;
            });
            document.getElementById('s-done').textContent = done;
            document.getElementById('s-weeks').textContent = weeksStarted;
            const pct = total ? Math.round(done / total * 100) : 0;
            document.getElementById('s-pct').textContent = pct + '%';
            document.getElementById('s-locked').textContent = locked;
            document.getElementById('overall-bar').style.width = pct + '%';
            document.getElementById('overall-pct-label').textContent = pct + '%';
        }

        // ─── RENDER WEEK ────────────────────────────────────────────────────────────
        function renderWeek(wk, phaseColor, phaseBg, weekIndex) {
            const mainDone = wk.tasks.filter((_, i) => state[taskId(wk.w, i)]).length;
            const mainTotal = wk.tasks.length;
            const parDone = (wk.parallel || []).filter((_, i) => state[parallelId(wk.w, i)]).length;
            const parTotal = (wk.parallel || []).length;
            const totalDone = mainDone + parDone;
            const totalTotal = mainTotal + parTotal;
            const pct = Math.round(totalDone / totalTotal * 100);
            const isOpen = !!state[openId(wk.w)];
            const allDone = totalDone === totalTotal;
            const unlocked = isWeekUnlocked(weekIndex);
            const cooldown = isInCooldown(weekIndex);

            const card = document.createElement('div');
            card.className = 'week-card' + ((!unlocked && !cooldown && weekIndex > 0) ? ' locked' : '');
            card.id = `card-w${wk.w}`;
            card.style.setProperty('--accent-color', phaseColor);

            let lockBadgeHtml = '';
            let cooldownHtml = '';
            if (!unlocked && weekIndex > 0) {
                if (cooldown) {
                    const rem = getCooldownRemaining(weekIndex);
                    lockBadgeHtml = `<span class="lock-badge cooldown">⏳ cooldown — <span class="cooldown-timer" data-week="${weekIndex}">${formatTimeRemaining(rem)}</span></span>`;
                    cooldownHtml = `<div class="cooldown-banner"><span class="icon">⏳</span><span>Cooldown active — this week unlocks in <strong><span data-week="${weekIndex}">${formatTimeRemaining(rem)}</span></strong>. No bulk-ticking allowed. Build the habit properly.</span></div>`;
                } else {
                    lockBadgeHtml = `<span class="lock-badge">🔒 complete week ${wk.w - 1} first</span>`;
                }
            }

            card.innerHTML = `
    <div class="week-header" onclick="toggleWeek(${wk.w},${weekIndex})">
      <span class="week-num" style="background:${phaseBg};color:${phaseColor};border:1px solid ${phaseColor}44">W${wk.w}</span>
      <span class="week-title">${wk.title}${allDone ? '<span class="week-complete-badge">✓ Done</span>' : ''}${lockBadgeHtml}</span>
      <span class="week-count" style="font-family:'Space Mono',monospace">${totalDone}/${totalTotal}</span>
      <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
    </div>
    <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${phaseColor},${phaseColor}99)"></div></div>
    <div class="week-body ${isOpen ? 'open' : ''}" id="body-w${wk.w}">
      ${cooldownHtml}
      <div class="section-label learning">📚 Learning Tasks</div>
      <ul class="task-list">
        ${wk.tasks.map((task, i) => {
                const id = taskId(wk.w, i);
                const checked = !!state[id];
                return `<li class="task-item${checked ? ' done' : ''}" id="li-${id}">
            <div class="task-checkbox-wrap">
              <input type="checkbox" id="${id}"${checked ? ' checked' : ''} onchange="toggleTask('${id}','main',${wk.w})">
              <div class="custom-check" style="${checked ? `background:${phaseColor};border-color:${phaseColor};box-shadow:0 0 10px ${phaseColor}` : ``}">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L4 7L9 1" stroke="${checked ? '#000' : '#fff'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div>
            <div class="task-content"><div class="task-title">${task.title}</div><div class="task-desc">${task.desc}</div></div>
          </li>`;
            }).join('')}
      </ul>
      ${wk.parallel ? `
      <div class="section-label parallel">⚡ Parallel Build</div>
      <ul class="task-list">
        ${wk.parallel.map((task, i) => {
                const id = parallelId(wk.w, i);
                const checked = !!state[id];
                return `<li class="task-item${checked ? ' done' : ''}" id="li-${id}">
            <div class="task-checkbox-wrap">
              <input type="checkbox" id="${id}"${checked ? ' checked' : ''} onchange="toggleTask('${id}','parallel',${wk.w})">
              <div class="custom-check" style="${checked ? `background:#00ddcc;border-color:#00ddcc;box-shadow:0 0 10px #00ddcc` : ``}">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L4 7L9 1" stroke="${checked ? '#000' : '#fff'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div>
            <div class="task-content"><div class="task-title">${task.title}</div><div class="task-desc">${task.desc}</div></div>
          </li>`;
            }).join('')}
      </ul>`: ''
                }
    </div>`;
            return card;
        }

        // ─── RENDER ────────────────────────────────────────────────────────────────
        function render() {
            const root = document.getElementById('root');
            root.innerHTML = '';
            let weekIndex = 0;
            phases.forEach(ph => {
                const label = document.createElement('div');
                label.className = 'phase-label';
                label.style.color = ph.color;
                label.textContent = ph.label;
                root.appendChild(label);
                ph.weeks.forEach(wk => {
                    root.appendChild(renderWeek(wk, ph.color, ph.bg, weekIndex));
                    weekIndex++;
                });
            });
            updateStats();
        }

        // ─── TOGGLE WEEK ───────────────────────────────────────────────────────────
        window.toggleWeek = function (w, weekIndex) {
            const unlocked = isWeekUnlocked(weekIndex);
            const cooldown = isInCooldown(weekIndex);
            if (!unlocked && !cooldown && weekIndex > 0) {
                showToast(`🔒 Complete Week ${w - 1} first to unlock this week.`, 'amber');
                return;
            }
            state[openId(w)] = !state[openId(w)];
            save();
            const body = document.getElementById(`body-w${w}`);
            const card = document.getElementById(`card-w${w}`);
            const chevron = card.querySelector('.chevron');
            body.classList.toggle('open');
            chevron.classList.toggle('open');
        };

        // ─── TOGGLE TASK ───────────────────────────────────────────────────────────
        window.toggleTask = function (id, type, wNum) {
            // Find week index
            const allWeeks = getAllWeeks();
            const weekIndex = allWeeks.findIndex(w => w.w === wNum);
            const unlocked = isWeekUnlocked(weekIndex);
            const cooldown = isInCooldown(weekIndex);

            if (!unlocked && !cooldown && weekIndex > 0) {
                showToast(`🔒 Unlock Week ${wNum} first.`, 'amber');
                // uncheck it back
                document.getElementById(id).checked = !!state[id];
                return;
            }
            if (cooldown) {
                showToast(`⏳ Cooldown active! ${formatTimeRemaining(getCooldownRemaining(weekIndex))} remaining.`, 'amber');
                document.getElementById(id).checked = !!state[id];
                return;
            }

            state[id] = !state[id];
            save();

            const li = document.getElementById(`li-${id}`);
            if (state[id]) li.classList.add('done');
            else li.classList.remove('done');

            // update custom check color
            const wk = allWeeks[weekIndex];
            const ph = phases.find(p => p.weeks.find(w => w.w === wNum));
            const phColor = ph ? ph.color : 'var(--green)';
            const checkbox = li.querySelector('.custom-check');
            if (state[id] && type === 'main') {
                checkbox.style.cssText = `background:${phColor};border-color:${phColor};box-shadow:0 0 10px ${phColor}`;
                checkbox.querySelector('path').setAttribute('stroke', '#000');
            } else if (state[id] && type === 'parallel') {
                checkbox.style.cssText = `background:#00ddcc;border-color:#00ddcc;box-shadow:0 0 10px #00ddcc`;
                checkbox.querySelector('path').setAttribute('stroke', '#000');
            } else {
                checkbox.style.cssText = '';
                checkbox.querySelector('path').setAttribute('stroke', '#fff');
            }

            // update mini bar
            const mainDone = wk.tasks.filter((_, i) => state[taskId(wk.w, i)]).length;
            const parDone = (wk.parallel || []).filter((_, i) => state[parallelId(wk.w, i)]).length;
            const totalDone = mainDone + parDone;
            const totalTotal = wk.tasks.length + (wk.parallel || []).length;
            const pct = Math.round(totalDone / totalTotal * 100);
            const card = document.getElementById(`card-w${wNum}`);
            card.querySelector('.week-count').textContent = `${totalDone}/${totalTotal}`;
            card.querySelector('.mini-bar-fill').style.width = pct + '%';

            // completion badge
            const titleEl = card.querySelector('.week-title');
            const existing = titleEl.querySelector('.week-complete-badge');
            if (totalDone === totalTotal && !existing) {
                titleEl.insertAdjacentHTML('beforeend', '<span class="week-complete-badge">✓ Done</span>');
            } else if (totalDone < totalTotal && existing) {
                existing.remove();
                delete state[weekCompletedKey(wNum)];
                save();
            }

            // streak
            if (state[id]) checkAndUpdateStreak(true);

            checkWeekCompletion(wNum);
            updateStats();
        };

        // ─── COOLDOWN LIVE TIMER ────────────────────────────────────────────────────
        function updateCooldownTimers() {
            const allWeeks = getAllWeeks();
            document.querySelectorAll('[data-week]').forEach(el => {
                const weekIndex = parseInt(el.getAttribute('data-week'));
                const rem = getCooldownRemaining(weekIndex);
                if (rem > 0) { el.textContent = formatTimeRemaining(rem); }
                else {
                    // cooldown just expired — re-render
                    render();
                }
            });
        }

        // ─── INIT ───────────────────────────────────────────────────────────────────
        renderQuote();
        const streakData = getStreakData();
        renderStreak(streakData);
        render();
        setInterval(updateCooldownTimers, 60000);

        // resize confetti canvas
        window.addEventListener('resize', () => {
            const c = document.getElementById('confetti-canvas');
            c.width = window.innerWidth; c.height = window.innerHeight;
        });
    </script>
</body>

</html>
