<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Hfinity</title>
</head>

<body>
    <div class="box">
        <header id="head">
            <h1>My Dashboard</h1>
            <p>Hfinity - Task & Habit Tracker</p>
        </header>
        <div class="input">
            <div class="input-head">
                <h2>To-Do List</h2>
            </div>
            <div class="input-main">
                <input type="text" name="Task" id="taskInput" placeholder="Add A New Task">
                <button id="addTask"><i class="fa-solid fa-plus"></i> Add Task</button>
            </div>

        </div>
        <div class="output">

        </div>
    </div>


    <script src="app.js"></script>
</body>

</html>
